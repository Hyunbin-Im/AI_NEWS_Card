# 30분마다 뉴스 수집 → 대시보드 재생성 → 커밋 (Vercel이 자동 재배포)
name: update-dashboard
permissions:
  contents: write   # 봇이 결과물을 push할 수 있게
on:
  schedule:
    - cron: "*/30 22-23,0-10 * * 0-5"  # KST 07~19시 (UTC 기준), 평일 위주
  workflow_dispatch: {}                 # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 수집 및 생성
        run: |
          python collector.py
          python generator.py
      - name: 커밋
        run: |
          git config user.name "newsbot"
          git config user.email "bot@users.noreply.github.com"
          git add index.html articles.json
          git diff --cached --quiet || git commit -m "auto: dashboard update"
          git push
